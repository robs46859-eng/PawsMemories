name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22"
  CI: "true"

jobs:
  # ===========================================================================
  # JOB 1: Type Check (gating)
  # ===========================================================================
  lint:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: Type check (tsc --noEmit)
        run: npm run lint

  # ===========================================================================
  # JOB 2: Unit Tests + AR Tests (gating)
  # Unit + AR tests are DB-agnostic (initDb skips when DB vars are absent) and
  # the contract/auth tests drive an in-process Express app (no port bind, no
  # real providers). A 15-minute job timeout is a hard backstop against the
  # historical "unit tests hung in CI" failure (open child-handle / interval).
  # The AR suite is covered by the single `npm test` step below (tests/*.test.mjs
  # already includes tests/ar_*, tests/brain_*, tests/pets_*, and
  # tests/paid_guards.test.mjs); the contract suite lives separately under
  # tests/contracts/ so it is NOT double-executed here.
  # ===========================================================================
  test:
    name: Unit & AR Tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      # Unit tests (all tests/*.test.mjs) — explicitly DB-disabled so any
      # spawned server child cannot attempt a MySQL connection.
      - name: Run unit tests
        run: npm test
        env:
          NODE_ENV: test
      - name: Run hostile-input security tests
        run: npm run test:security
        env:
          NODE_ENV: test

  # ===========================================================================
  # JOB 3: Production Build (gating)
  # ===========================================================================
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: Build Vite frontend + bundle server
        run: npm run build
      - name: Verify dist/ exists
        run: |
          test -d dist && echo "dist/ directory exists" || exit 1
          test -f dist/index.html && echo "dist/index.html exists" || exit 1
          test -f dist/server.cjs && echo "dist/server.cjs exists" || exit 1
      - uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
          retention-days: 7

  # ===========================================================================
  # JOB 4: IFC Tests (Python) — single source of truth for IFC discovery.
  # (The previous duplicate `test:ifc` step inside the unit job was removed
  # to avoid double execution and a broken discovery path.)
  # ===========================================================================
  test-ifc:
    name: IFC Tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        working-directory: blender-worker/ifc_worker
        run: pip install -r requirements.txt
      - name: Run IFC tests
        working-directory: blender-worker/ifc_worker
        # Correct discovery: run from inside ifc_worker so `tests` is a
        # top-level package (no double `ifc_worker/tests` path).
        run: PYTHONPATH=. python3 -m unittest discover -s tests -v

  # ===========================================================================
  # JOB 5: Security Scanning (gating)
  # ===========================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      # Gating: failures must fail the build (no `|| echo`).
      - name: npm audit (moderate+)
        run: npm audit --audit-level=moderate
      - name: npm audit signatures
        run: npm audit signatures
      - name: Secret scanning (gitleaks)
        # Config: .gitleaks.toml extends the gitleaks defaults (useDefault=true)
        # and contains NO path or broad-value allowlists. The few obviously
        # non-secret CI placeholder values are suppressed per-line with
        # `# gitleaks:allow` comments in this file instead.
        # (The gitleaks-action auto-detects .gitleaks.toml at repo root.)
        uses: gitleaks/gitleaks-action@v2
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: results.sarif
          if-no-files-found: ignore
          retention-days: 30

  # ===========================================================================
  # JOB 6: Contract Tests (in-process production routes, fakes + counters)
  # Distinct files (tests/contracts/*.test.mjs) so this does NOT overlap with
  # the `npm test` job above.
  # ===========================================================================
  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    needs: [lint, test]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: Run contract tests
        run: npm run test:contracts
        env:
          NODE_ENV: test
          PETSIM_RIG_ENABLED: "false"
          PETSIM_CLASSIFY_ENABLED: "true"
          PETSIM_SEMANTIC_SCAN_ENABLED: "true"

# ---------------------------------------------------------------------------
# FUTURE / NON-GATING JOBS (intentionally NOT defined here to keep CI honest):
#   - coverage: requires c8 + a Codecov token; add as a non-gating job once
#     those are configured.
#   - deploy-staging / notify: were placeholder echo jobs with no real effect;
#     removed to avoid implying a deploy or alerting that does not happen.
#   - branch-protection: is a GITHUB OWNER SETTING (branch protection rules
#     on `main`), not a CI job. Enable it in repo Settings > Branches.
# ---------------------------------------------------------------------------
