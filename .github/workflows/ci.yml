name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22"
  CI: "true"

jobs:
  # ============================================================================
  # JOB 1: Lint & Type Check
  # ============================================================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: ESLint (if configured)
        run: npm run lint:eslint || echo "ESLint not configured"

  # ============================================================================
  # JOB 2: Unit Tests
  # ============================================================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Initialize test database
        run: |
          # Create empty MySQL database for testing
          # Note: In production CI, use test database with proper schema
          echo "Test database setup placeholder"

      - name: Run unit tests
        run: npm test
        env:
          NODE_ENV: test
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: pawsmemories_test
          DB_USER: root
          DB_PASSWORD: test
          JWT_SECRET: test-secret-for-ci-only
          ADMIN_KEY: admin
          ADMIN_EMAIL: admin@test.com
          ADMIN_PASSWORD: test
          MEDIA_BUCKET_NAME: test-bucket
          MEDIA_BUCKET_URL: http://localhost:9000
          MEDIA_BUCKET_KEY: minioadmin
          MEDIA_BUCKET_SECRET: minioadmin
          TRIPO_API_KEY: test-key
          GEMINI_API_KEY: test-key
          BLENDER_WORKER_URL: http://localhost:8000/render
          WORKER_SHARED_SECRET: test-secret

      - name: Run AR tests
        run: npm run test:ar
        env:
          NODE_ENV: test
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: pawsmemories_test
          DB_USER: root
          DB_PASSWORD: test
          JWT_SECRET: test-secret-for-ci-only
          ADMIN_KEY: admin
          ADMIN_EMAIL: admin@test.com
          ADMIN_PASSWORD: test
          MEDIA_BUCKET_NAME: test-bucket
          MEDIA_BUCKET_URL: http://localhost:9000
          MEDIA_BUCKET_KEY: minioadmin
          MEDIA_BUCKET_SECRET: minioadmin
          TRIPO_API_KEY: test-key
          GEMINI_API_KEY: test-key
          BLENDER_WORKER_URL: http://localhost:8000/render
          WORKER_SHARED_SECRET: test-secret

      - name: Run IFC tests
        run: npm run test:ifc
        env:
          PYTHONPATH: blender-worker/ifc_worker

  # ============================================================================
  # JOB 3: Production Build
  # ============================================================================
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Vite frontend
        run: npm run build

      - name: Verify dist/ exists
        run: |
          test -d dist && echo "✅ dist/ directory exists" || exit 1
          test -f dist/index.html && echo "✅ dist/index.html exists" || exit 1
          test -f dist/server.cjs && echo "✅ dist/server.cjs exists" || exit 1

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/
          retention-days: 7

  # ============================================================================
  # JOB 4: IFC Tests (Python)
  # ============================================================================
  test-ifc:
    name: IFC Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          cd blender-worker/ifc_worker
          pip install -r requirements.txt

      - name: Run IFC tests
        run: |
          cd blender-worker/ifc_worker
          PYTHONPATH=ifc_worker python3 -m unittest discover -s ifc_worker/tests -v

  # ============================================================================
  # JOB 5: Security Scanning
  # ============================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate || echo "npm audit complete (check results below)"

      - name: Run dependency check
        run: npm install -g @npmcli/arborist && npx npm-audit-reporter || echo "Dependency check skipped"

      - name: Secret scanning (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        with:
          args: --report-format=json --report-path=gitleaks-report.json

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: gitleaks-report.json
          retention-days: 30

  # ============================================================================
  # JOB 6: Code Coverage (Optional)
  # ============================================================================
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install coverage tool
        run: npm install --save-dev c8

      - name: Run tests with coverage
        run: npx c8 --reporter=lcov npm test
        env:
          NODE_ENV: test
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: pawsmemories_test
          DB_USER: root
          DB_PASSWORD: test
          JWT_SECRET: test-secret-for-ci-only
          ADMIN_KEY: admin
          ADMIN_EMAIL: admin@test.com
          ADMIN_PASSWORD: test
          MEDIA_BUCKET_NAME: test-bucket
          MEDIA_BUCKET_URL: http://localhost:9000
          MEDIA_BUCKET_KEY: minioadmin
          MEDIA_BUCKET_SECRET: minioadmin
          TRIPO_API_KEY: test-key
          GEMINI_API_KEY: test-key
          BLENDER_WORKER_URL: http://localhost:8000/render
          WORKER_SHARED_SECRET: test-secret

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-pawsome3d
          fail_ci_if_error: false

  # ============================================================================
  # JOB 7: Contract Tests (HTTP Route Tests)
  # ============================================================================
  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run contract tests
        run: npm run test:contracts
        env:
          NODE_ENV: test
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: pawsmemories_test
          DB_USER: root
          DB_PASSWORD: test
          JWT_SECRET: test-secret-for-ci-only
          ADMIN_KEY: admin
          ADMIN_EMAIL: admin@test.com
          ADMIN_PASSWORD: test
          MEDIA_BUCKET_NAME: test-bucket
          MEDIA_BUCKET_URL: http://localhost:9000
          MEDIA_BUCKET_KEY: minioadmin
          MEDIA_BUCKET_SECRET: minioadmin
          TRIPO_API_KEY: test-key
          GEMINI_API_KEY: test-key
          BLENDER_WORKER_URL: http://localhost:8000/render
          WORKER_SHARED_SECRET: test-secret
          PETSIM_RIG_ENABLED: "false"
          PETSIM_CLASSIFY_ENABLED: "true"
          PETSIM_SEMANTIC_SCAN_ENABLED: "true"

  # ============================================================================
  # JOB 8: Branch Protection Check
  # ============================================================================
  branch-protection:
    name: Branch Protection
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check PR is not from fork
        if: github.event.pull_request.head.repo.fork == true
        run: |
          echo "⚠️ PRs from forks are not allowed to run full CI"
          # Optionally fail the build for fork PRs
          # exit 1

      - name: Check PR has labels
        uses: mheap/github-action-required-labels@v5
        with:
          mode: minimum
          count: 1
          labels: |
            type:ci
            type:security
            type:feature
            type:bugfix

  # ============================================================================
  # JOB 9: Staging Deployment (Optional - triggered manually or on main push)
  # ============================================================================
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging.pawsome3d.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: dist

      - name: Build deploy zip
        run: |
          bash scripts/build-deploy-zip.sh
          ls -la pawsome3d-deploy.zip

      - name: Upload to staging
        run: |
          # Placeholder for staging deployment
          # This would typically use Hostinger API or SCP
          echo "Staging deployment placeholder - implement your deployment method"
          # Example: scp pawsome3d-deploy.zip staging-user@staging.pawsome3d.com:/var/www/

      - name: Verify deployment
        run: |
          # Placeholder for deployment verification
          # curl -f https://staging.pawsome3d.com || exit 1
          echo "Deployment verification placeholder"

  # ============================================================================
  # JOB 10: Notify on Failure
  # ============================================================================
  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: failure()
    steps:
      - name: Send notification
        run: |
          # Placeholder for notification system
          # This would integrate with Slack, email, or other channels
          echo "CI pipeline failed - notification placeholder"
