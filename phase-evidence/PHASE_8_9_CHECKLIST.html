<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Phase 8-9 AI and BIM Review</title><style>
:root{--ink:#18302b;--paper:#f4efe3;--card:#fffaf0;--rust:#b94f32;--green:#276653;--gold:#c79631;--line:#b8b2a4}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 10% 0,#d6e6df,transparent 34%),linear-gradient(145deg,var(--paper),#ead8c5);color:var(--ink);font:15px/1.5 Georgia,serif}.wrap{max-width:1080px;margin:auto;padding:24px clamp(20px,4vw,42px) 48px}header{border-bottom:4px solid var(--rust);padding:12px 0 20px}h1{font-size:clamp(30px,6vw,56px);line-height:1;margin:6px 0}h2{margin:32px 0 10px;color:var(--rust)}.status{font:700 12px sans-serif;letter-spacing:.12em;text-transform:uppercase}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}.card{background:color-mix(in srgb,var(--card) 94%,transparent);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:0 12px 30px #18302b12}.item{display:flex;gap:10px;padding:9px 0;border-bottom:1px dotted var(--line)}.item:last-child{border:0}.done{color:var(--green)}.pending{color:#8b4a11}input{accent-color:var(--green);margin-top:5px}textarea{width:100%;min-height:110px;border:1px solid var(--line);border-radius:10px;background:white;padding:12px;font:14px/1.4 sans-serif}.comments{min-height:160px}button{border:0;border-radius:9px;background:var(--ink);color:white;padding:10px 14px;font-weight:700}@media(max-width:430px){.wrap{padding-left:20px;padding-right:20px}.card{padding:14px}}@media print{button{display:none}.card{box-shadow:none}}
</style></head><body><main class="wrap"><header><div class="status">Updated 2026-07-22 | Default-off integration</div><h1>AI and Scaled BIM Review</h1><p>Phase 8 Randy grounding and Phase 9 calibrated shell/IFC evidence. Checks and notes persist in this browser.</p></header>
<h2>Phase 8 - Randy</h2><div class="grid"><section class="card"><label class="item done"><input type="checkbox" checked> Versioned module registry uses server-owned prices</label><label class="item done"><input type="checkbox" checked> Live balance/admin context is supplied, not invented</label><label class="item done"><input type="checkbox" checked> Request, response, route, tour, and selector schemas fail closed</label><label class="item done"><input type="checkbox" checked> Navigation/actions require a user click</label><label class="item done"><input type="checkbox" checked> Rate limit and privacy-safe action audit are active</label></section><section class="card"><label class="item pending"><input type="checkbox"> Production Randy GLB and measured LODs accepted</label><label class="item pending"><input type="checkbox"> Rig, jaw, blink, viseme, and deformation evidence accepted</label><label class="item pending"><input type="checkbox"> Weak-GPU/mobile budget passes</label><label class="item pending"><input type="checkbox"> Keyboard and screen-reader fallback passes</label><label class="item pending"><input type="checkbox"> Live module/pricing/status walkthrough corpus passes</label></section></div>
<h2>Phase 9 - Calibrated Shell and IFC</h2><div class="grid"><section class="card"><label class="item done"><input type="checkbox" checked> Text/image calibration and decoded observed-view binding</label><label class="item done"><input type="checkbox" checked> Strict Gemini proposal cannot bypass user review</label><label class="item done"><input type="checkbox" checked> Independent pre-build dimension gate runs before charging</label><label class="item done"><input type="checkbox" checked> Delivered shell/IFC dimensions are checked again</label><label class="item done"><input type="checkbox" checked> Shell and IFC claims and 60/300-credit prices remain distinct</label></section><section class="card"><label class="item done"><input type="checkbox" checked> IFC code checks schema, units, placements, unique IDs, hierarchy, property sets, void/fill relationships, CRS label, and reopen</label><label class="item pending"><input type="checkbox"> Private owner-scoped storage and signed downloads replace public BIM URLs</label><label class="item pending"><input type="checkbox"> Durable idempotent build, credit, retry, and refund ledger passes</label><label class="item pending"><input type="checkbox"> Six-test suite passes on Render IfcOpenShell 0.8.5</label><label class="item pending"><input type="checkbox"> Real Gemini text and multi-image fixtures accepted</label><label class="item pending"><input type="checkbox"> Light/dark 320/360/390/430px and desktop matrix passes</label></section></div>
<section class="card"><h2>Reviewer Notes</h2><textarea id="notes" placeholder="Record model dimensions, visual uncertainty, worker evidence, and test results..."></textarea><h2>Comments / Handoff</h2><textarea id="comments" class="comments" placeholder="Add dated comments and blockers for the next agent..."></textarea><p><button id="reset" type="button">Reset local review</button></p></section></main><script>
const key="paws-phase-8-9-review";const fields=[...document.querySelectorAll("input,textarea")];try{const saved=JSON.parse(localStorage.getItem(key)||"[]");fields.forEach((field,index)=>{if(saved[index]!==undefined){field.type==="checkbox"?field.checked=saved[index]:field.value=saved[index]}})}catch{}const save=()=>localStorage.setItem(key,JSON.stringify(fields.map(field=>field.type==="checkbox"?field.checked:field.value)));fields.forEach(field=>field.addEventListener("change",save));document.querySelector("#reset").addEventListener("click",()=>{localStorage.removeItem(key);location.reload()});
</script></body></html>
