# Render Blueprint — pawsome3d blender-worker
# One repo, one branch (main), everything ships:
#   push to main → Render auto-builds blender-worker/Dockerfile → live worker.
# The main app is NOT deployed from here (it ships to Hostinger via
# scripts/build-deploy-zip.sh — see DEPLOYMENT_NOTES.md).
#
# First-time setup: Render Dashboard → New → Blueprint → select this repo.
# Existing service instead? Just set its Branch to `main` and Auto-Deploy to Yes;
# this file then simply documents the config.
services:
  - type: web
    name: pawsome3d-blender-worker
    runtime: docker
    plan: standard            # Blender + IfcOpenShell need RAM; bump if OOM
    rootDir: blender-worker
    dockerfilePath: ./Dockerfile
    branch: main
    autoDeploy: true          # all changes ship: merge to main = worker deploy
    healthCheckPath: /health
    envVars:
      - key: WORKER_SHARED_SECRET
        sync: false           # set in dashboard; MUST match Hostinger app env
      - key: PORT
        value: "10000"
