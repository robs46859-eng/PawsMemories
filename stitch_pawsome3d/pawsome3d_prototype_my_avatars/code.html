<script>
        // Simple micro-interactions for avatar selection
        const avatarGridItems = document.querySelectorAll('.grid.grid-cols-3 .aspect-square:not(a)');
        avatarGridItems.forEach(item => {
            item.addEventListener('click', () => {
                avatarGridItems.forEach(i => i.classList.remove('border-primary', 'border-2', 'shadow-lg'));
                avatarGridItems.forEach(i => i.classList.add('border-outline-variant', 'border'));
                
                item.classList.remove('border-outline-variant', 'border');
                item.classList.add('border-primary', 'border-2', 'shadow-lg');
                
                // Feedback vibration if supported
                if ('vibrate' in navigator) {
                    navigator.vibrate(10);
                }
            });
        });

        // Dynamic header shrink on scroll
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 20) {
                header.classList.add('py-2', 'shadow-md');
                header.classList.remove('py-4', 'shadow-sm');
            } else {
                header.classList.add('py-4', 'shadow-sm');
                header.classList.remove('py-2', 'shadow-md');
            }
        });
    </script>
